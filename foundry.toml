[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
fs_permissions = [{ access = "read-write", path = "./scoring" }]

# Fork RPC endpoints used by later scenarios (flash-loan / oracle).
# Reentrancy (scenario 01) runs fully local — no fork needed.
[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
