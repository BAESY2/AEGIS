name: fork

# Optional, non-blocking: run the forked-mainnet oracle integration against REAL
# Uniswap V2 state via a public RPC. Public endpoints can rate-limit, so this is
# kept out of the required CI and allowed to fail without blocking. Runs on a
# weekly schedule and on demand.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1" # Mondays 09:00 UTC

jobs:
  fork-oracle:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - run: forge install foundry-rs/forge-std --no-commit || true
      - name: Fork-test the oracle guards on live mainnet state
        env:
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL || 'https://ethereum-rpc.publicnode.com' }}
        run: forge test --match-contract ForkOracle -vv
