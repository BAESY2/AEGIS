name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  forge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install dependencies
        run: forge install foundry-rs/forge-std --no-commit || true

      - name: Build
        run: forge build --sizes

      - name: Test
        run: forge test -vv

  gym-smoke:
    runs-on: ubuntu-latest
    needs: forge
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - run: forge install foundry-rs/forge-std --no-commit || true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Single-config gym smoke
        run: |
          AEGIS_CAP=8 forge test --match-test test_scoreOne -q
          python3 - <<'PY'
          import json
          d = json.load(open("scoring/run.json"))
          assert d["reward_1e18"] == 10**18, d
          print("gym smoke ok:", d)
          PY
