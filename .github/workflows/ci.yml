name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  forge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install dependencies
        run: forge install foundry-rs/forge-std --no-commit || true

      - name: Build
        run: forge build --sizes

      - name: Test
        run: forge test -vv

  python-unit:
    # Fast, forge-free logic tests for the benchmark package.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Unit tests (no forge required)
        run: |
          cd aegis-gym
          python3 -m unittest discover -s tests -v

  gym-smoke:
    # End-to-end smoke: the EVM-backed scorer and unified CLI agree on a known
    # matchup, and the single-config gym path returns the expected reward.
    runs-on: ubuntu-latest
    needs: [forge, python-unit]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - run: forge install foundry-rs/forge-std --no-commit || true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Single-config gym smoke
        run: |
          AEGIS_CAP=8 forge test --match-test test_scoreOne -q
          python3 - <<'PY'
          import json
          d = json.load(open("scoring/run.json"))
          assert d["reward_1e18"] == 10**18, d
          print("gym smoke ok:", d)
          PY
      - name: Unified CLI smoke (structural defenses score perfectly)
        run: |
          cd aegis-gym
          python3 -m aegis score reentrancy peraddr 2
          python3 -m aegis score oracle lagged 3
          python3 -m aegis score access owneronly 11

  benchmark-invariants:
    # The "living benchmark" gate: on the EVM, the structural defense must top
    # every scenario and generalize (gap ~0) while threshold defenses overfit.
    runs-on: ubuntu-latest
    needs: [forge, python-unit]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - run: forge install foundry-rs/forge-std --no-commit || true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify benchmark invariants
        run: |
          cd aegis-gym
          python3 -m aegis verify
